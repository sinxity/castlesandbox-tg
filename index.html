// ── NOISE ─────────────────────────────────────────────────────
function hash(x,y){let h=(x*374761393+y*668265263);h=(h^(h>>13))*1274126177;return((h^(h>>16))&0xffff)/0xffff;}
function noise(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);return hash(ix,iy)*(1-u)*(1-v)+hash(ix+1,iy)*u*(1-v)+hash(ix,iy+1)*(1-u)*v+hash(ix+1,iy+1)*u*v;}

function polyContains(poly,px,py,W,H){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0]*W,yi=poly[i][1]*H,xj=poly[j][0]*W,yj=poly[j][1]*H;
    if((yi>py)!==(yj>py)&&px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}
function segDist(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(l2===0) return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}
function getMtn(nx,ny,W){
  let mx=0;
  for(const m of MTNS) for(let i=0;i<m.p.length-1;i++){
    const d=segDist(nx,ny,m.p[i][0],m.p[i][1],m.p[i+1][0],m.p[i+1][1]);
    const s=Math.max(0,1-d/m.w);if(s>mx)mx=s;
  }
  return mx;
}
function getFst(nx,ny,W){
  let mx=0;
  for(const f of FORESTS){
    const d=Math.hypot((nx-f.c[0])*W,(ny-f.c[1])*W);
    const s=Math.max(0,1-d/(f.r*W));if(s>mx)mx=s;
  }
  return mx;
}

function clampCam(){
  if(!canvas) return;
  const vw=wrap.clientWidth,vh=wrap.clientHeight;
  const maxX=Math.max(0,W*camZ-vw);
  const maxY=Math.max(0,H*camZ-vh);
  camX=Math.max(0,Math.min(camX,maxX));
  camY=Math.max(0,Math.min(camY,maxY));
}

function applyTransform(){
  canvas.style.transformOrigin='0 0';
  canvas.style.transform=`translate(${-camX}px,${-camY}px) scale(${camZ})`;
}

function showZoomIndicator(){}

// Screen → canvas coords (accounts for wrap offset + zoom + pan)
function screenToCanvas(sx,sy){
  const rect=wrap.getBoundingClientRect();
  const rx=sx-rect.left;
  const ry=sy-rect.top;
  return{x:(rx+camX)/camZ, y:(ry+camY)/camZ};
}

// ── INIT ──────────────────────────────────────────────────────
function initBase(){
  canvas=document.getElementById('gc');
  wrap=document.getElementById('cw');
  // Screen size = canvas size, no DPR scaling (fixes stretch bug)
  // Map is 2.5x screen size for more world to explore
  W=Math.floor(wrap.clientWidth*2.5);
  H=Math.floor(wrap.clientHeight*2.5);
  canvas.width=W;canvas.height=H;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  canvas.style.transformOrigin='0 0';
  canvas.style.transform='none';
  ctx=canvas.getContext('2d');
  terrCanvas=document.createElement('canvas');
  terrCanvas.width=W;terrCanvas.height=H;
  terrCtx=terrCanvas.getContext('2d');
  camX=0;camY=0;camZ=1;
  isPanMode=false;
  grid=[];
  for(let y=0;y<H;y++){grid[y]=[];for(let x=0;x<W;x++) grid[y][x]={type:'water',fa:0};}
  bots=[];castles=[];armies=[];raids=[];defeated=[];lootAnims=[];particles=[];tick=0;evts=[];dayTime=0;
}

function isLand(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  if(ix<0||iy<0||ix>=W||iy>=H) return false;
  return landMask&&landMask[iy*W+ix]===1;
}

// ── MASK BUILD (async chunked) ────────────────────────────────
function buildMask(onDone){
  landMask=new Uint8Array(W*H);
  let y=0;
  function step(){
    const end=Math.min(y+12,H);
    for(;y<end;y++) for(let x=0;x<W;x++){
      for(const poly of POLYS){
        if(polyContains(poly,x,y,W,H)){landMask[y*W+x]=1;break;}
      }
    }
    const pct=Math.round(y/H*100);
    document.getElementById('loading-pct').textContent='Генерируем мир... '+pct+'%';
    document.getElementById('loading-bar').style.width=pct+'%';
    if(y<H) requestAnimationFrame(step); else onDone();
  }
  requestAnimationFrame(step);
}

// ── MAP RENDER ────────────────────────────────────────────────
function buildMapCache(){
  mapCache=document.createElement('canvas');
  mapCache.width=W;mapCache.height=H;
  const mc=mapCache.getContext('2d');
  const img=mc.createImageData(W,H);
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const nx=x/W,ny=y/H;
    const land=isLand(x,y);
    const n=noise(nx*35,ny*35)*0.5+noise(nx*70,ny*70)*0.3+noise(nx*140,ny*140)*0.2;
    let r,g2,b;
    if(!land){
      const n1=isLand(x-1,y)||isLand(x+1,y)||isLand(x,y-1)||isLand(x,y+1);
      const n2=!n1&&(isLand(x-3,y)||isLand(x+3,y)||isLand(x,y-3)||isLand(x,y+3));
      if(n1){r=24;g2=95;b=170;}else if(n2){r=18;g2=75;b=148;}else{r=13;g2=45;b=95;}
      const v=Math.floor(n*6-3);r+=v;g2+=v;b+=v;
    } else {
      const ms=getMtn(nx,ny,W);
      const fs=getFst(nx,ny,W);
      if(ms>0.72||(ny<0.15&&ms>0.2)){r=210+Math.floor(n*20);g2=218+Math.floor(n*18);b=238+Math.floor(n*12);}
      else if(ms>0.2){const t=Math.min(1,(ms-0.2)/0.55);r=Math.round(60+t*78+n*10);g2=Math.round(95+t*45+n*8);b=Math.round(40+t*110+n*12);}
      else{
        const c1=!isLand(x-1,y)||!isLand(x+1,y)||!isLand(x,y-1)||!isLand(x,y+1);
        const c2=!c1&&(!isLand(x-2,y)||!isLand(x+2,y)||!isLand(x,y-2)||!isLand(x,y+2));
        if(c1||c2){r=Math.round(195+n*20);g2=Math.round(162+n*15);b=Math.round(65+n*12);}
        else if(fs>0.25){const t=Math.min(1,(fs-0.25)/0.5);r=Math.round(55-t*22+n*10);g2=Math.round(100-t*28+n*10);b=Math.round(35-t*12+n*8);}
        else{r=Math.round(58+n*14);g2=Math.round(105+n*14);b=Math.round(40+n*10);}
      }
    }
    const i=(y*W+x)*4;
    img.data[i]=Math.max(0,Math.min(255,r));
    img.data[i+1]=Math.max(0,Math.min(255,g2));
    img.data[i+2]=Math.max(0,Math.min(255,b));
    img.data[i+3]=255;
  }
  mc.putImageData(img,0,0);
  mc.strokeStyle='rgba(40,100,200,0.6)';mc.lineWidth=1.5;
  RIVERS.forEach(rv=>{
    mc.beginPath();mc.moveTo(rv[0][0]*W,rv[0][1]*H);
    for(let i=1;i<rv.length;i++) mc.lineTo(rv[i][0]*W,rv[i][1]*H);
    mc.stroke();
  });
  // Sync grid with map so terrain is interactive
  initGridFromMap();
}

function initGridFromMap(){
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const nx=x/W,ny=y/H;
    const land=isLand(x,y);
    if(!land){grid[y][x].type='water';continue;}
    const ms=getMtn(nx,ny,W);
    const fs=getFst(nx,ny,W);
    if(ms>0.72||(ny<0.15&&ms>0.2)) grid[y][x].type='snow';
    else if(ms>0.45) grid[y][x].type='mountain';
    else if(ms>0.2) grid[y][x].type='rock';
    else{
      const coast=!isLand(x-1,y)||!isLand(x+1,y)||!isLand(x,y-1)||!isLand(x,y+1)||
                  !isLand(x-2,y)||!isLand(x+2,y)||!isLand(x,y-2)||!isLand(x,y+2);
      if(coast) grid[y][x].type='sand';
      else if(fs>0.35) grid[y][x].type=ny<0.3?'pine':'tree';
      else grid[y][x].type='grass';
    }
  }
  // Add rivers as water in grid
  RIVERS.forEach(rv=>{
    for(let i=0;i<rv.length-1;i++){
      const x0=Math.round(rv[i][0]*W),y0=Math.round(rv[i][1]*H);
      const x1=Math.round(rv[i+1][0]*W),y1=Math.round(rv[i+1][1]*H);
      const steps=Math.max(Math.abs(x1-x0),Math.abs(y1-y0));
      for(let s=0;s<=steps;s++){
        const rx=Math.round(x0+(x1-x0)*s/steps);
        const ry=Math.round(y0+(y1-y0)*s/steps);
        if(rx>=0&&ry>=0&&rx<W&&ry<H) grid[ry][rx].type='water';
      }
    }
  });
}

// ── TERRITORY ─────────────────────────────────────────────────
function computeTerritory(c){
  const sx=Math.round(c.nx*W),sy=Math.round(c.ny*H);
  const maxD=Math.round(c.radius*Math.min(W,H)/100);
  const visited=new Uint8Array(W*H);
  const queue=[];queue.push(sx,sy,0);
  visited[sy*W+sx]=1;
  const cells=[];let qi=0;
  while(qi<queue.length){
    const x=queue[qi++],y=queue[qi++],d=queue[qi++];
    if(d>maxD) continue;
    cells.push(x,y);
    for(const[dx,dy] of D4){
      const nx2=x+dx,ny2=y+dy;
      if(nx2<0||ny2<0||nx2>=W||ny2>=H) continue;
      const k=ny2*W+nx2;
      if(visited[k]) continue;
      const ct=grid[ny2]&&grid[ny2][nx2]?grid[ny2][nx2].type:'water';
      if(!isLand(nx2,ny2)||ct==='water'||ct==='lava') continue;
      visited[k]=1;queue.push(nx2,ny2,d+1);
    }
  }
  c.cells=cells;
}

function rebuildTerritories(){
  terrCtx.clearRect(0,0,W,H);
  castles.forEach(c=>{
    if(!c.cells||c.cells.length<2) return;
    const col=TCRGB[c.team]||'128,128,128';
    const cellSet=new Set();
    for(let i=0;i<c.cells.length;i+=2) cellSet.add(c.cells[i+1]*W+c.cells[i]);
    // Draw filled territory
    terrCtx.fillStyle=`rgba(${col},0.15)`;
    for(let i=0;i<c.cells.length;i+=2){
      terrCtx.fillRect(c.cells[i],c.cells[i+1],2,2);
    }
    // Draw border on top
    terrCtx.fillStyle=`rgba(${col},0.9)`;
    for(let i=0;i<c.cells.length;i+=2){
      const x=c.cells[i],y=c.cells[i+1];
      const border=!cellSet.has(y*W+(x-1))||!cellSet.has(y*W+(x+1))||!cellSet.has((y-1)*W+x)||!cellSet.has((y+1)*W+x);
      if(border) terrCtx.fillRect(x,y,2,2);
    }
  });
}

// ── DRAW ──────────────────────────────────────────────────────
function spawnExplosion(cx,cy,count,r,g,b){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*4;
    particles.push({x:cx,y:cy,
      vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      r,g,b,age:0,maxAge:20+Math.floor(Math.random()*20),
      size:1+Math.random()*2});
  }
}

function spawnFireParticle(cx,cy){
  const colors=[[255,140,0],[255,80,0],[255,220,0],[200,50,0]];
  const c=colors[Math.floor(Math.random()*colors.length)];
  particles.push({x:cx+Math.random()*4-2,y:cy,
    vx:(Math.random()-0.5)*0.8,vy:-0.5-Math.random()*1.5,
    r:c[0],g:c[1],b:c[2],age:0,maxAge:12+Math.floor(Math.random()*8),
    size:1+Math.random()});
}

function updateParticles(){
  particles=particles.filter(p=>{
    p.age++;
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.08; // gravity
    const alpha=Math.max(0,1-p.age/p.maxAge);
    ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${alpha.toFixed(2)})`;
    ctx.fillRect(Math.round(p.x),Math.round(p.y),Math.ceil(p.size),Math.ceil(p.size));
    return p.age<p.maxAge;
  });
}

function drawCastle(c){
  const cx=Math.round(c.nx*W),cy=Math.round(c.ny*H),tc=TC[c.team]||'#888';
  const isDefeated=defeated.find(d=>d.castle===c);
  const wallCol=isDefeated?'#554444':'#88889a';
  const wallHi=isDefeated?'#665555':'#aaaabc';
  const keepCol=isDefeated?'#553333':'#7070a0';

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(cx-13,cy-11,28,28);

  // Outer walls
  ctx.fillStyle=wallCol;
  ctx.fillRect(cx-13,cy-13,26,3);
  ctx.fillRect(cx-13,cy+10,26,3);
  ctx.fillRect(cx-13,cy-13,3,26);
  ctx.fillRect(cx+10,cy-13,3,26);

  // Wall highlight top
  ctx.fillStyle=wallHi;
  ctx.fillRect(cx-13,cy-13,26,1);
  ctx.fillRect(cx-13,cy-13,1,26);

  // Crenellations
  ctx.fillStyle=wallHi;
  for(let i=-11;i<=9;i+=4){
    ctx.fillRect(cx+i,cy-16,3,4);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(cx+i,cy-16,1,4);
    ctx.fillStyle=wallHi;
  }

  // Corner towers
  [[-12,-12],[10,-12],[-12,10],[10,10]].forEach(([tx,ty])=>{
    // Tower body
    ctx.fillStyle=isDefeated?'#664444':'#9999aa';
    ctx.fillRect(cx+tx-1,cy+ty-1,8,8);
    // Tower top
    ctx.fillStyle=isDefeated?'#775555':'#bbbbcc';
    ctx.fillRect(cx+tx-1,cy+ty-1,8,2);
    // Tower shadow side
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(cx+tx+6,cy+ty,2,8);
    // Flag
    if(!isDefeated){
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(cx+tx+2,cy+ty-4,1,4);
      ctx.fillStyle=tc;ctx.fillRect(cx+tx+3,cy+ty-4,3,2);
    }
  });

  // Keep (center)
  ctx.fillStyle=keepCol;ctx.fillRect(cx-6,cy-6,12,12);
  ctx.fillStyle=isDefeated?'#442222':'#50508a';ctx.fillRect(cx-4,cy-1,8,7);
  // Keep gate
  ctx.fillStyle='#111122';ctx.fillRect(cx-1,cy+1,3,6);
  // Keep windows
  ctx.fillStyle='rgba(150,200,255,0.5)';
  ctx.fillRect(cx-4,cy-4,2,2);ctx.fillRect(cx+2,cy-4,2,2);
  // Keep top
  ctx.fillStyle=isDefeated?'#553333':'#8080b0';ctx.fillRect(cx-6,cy-6,12,2);

  // Flag on keep
  if(!isDefeated){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(cx,cy-12,1,7);
    ctx.fillStyle=tc;ctx.fillRect(cx+1,cy-12,6,4);
    // Flag shine
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(cx+1,cy-12,2,1);
  } else {
    // Broken flag
    ctx.fillStyle='#555';ctx.fillRect(cx,cy-10,1,5);
  }

  // Power ring
  const pct=Math.min(1,c.power/250);
  ctx.beginPath();ctx.arc(cx,cy,20,0-Math.PI/2,0-Math.PI/2+Math.PI*2*pct);
  ctx.strokeStyle=isDefeated?'rgba(150,50,50,0.5)':tc;
  ctx.lineWidth=2;ctx.stroke();ctx.lineWidth=1;

  // Power label
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(cx-11,cy+18,22,9);
  ctx.fillStyle=isDefeated?'#aa4444':tc;
  ctx.font='bold 7px monospace';ctx.textAlign='center';
  ctx.fillText(isDefeated?'💀':'⚡'+Math.floor(c.power),cx,cy+25);
  ctx.textAlign='left';

  // Warehouse (improved)
  if(!isDefeated){
    const wx=cx+22,wy=cy+2;
    // Warehouse shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(wx+1,wy+1,12,10);
    // Warehouse body
    ctx.fillStyle='#7a5a2a';ctx.fillRect(wx,wy,12,10);
    // Warehouse roof
    ctx.fillStyle='#9a7a3a';ctx.fillRect(wx,wy,12,3);
    // Warehouse door
    ctx.fillStyle='#3a2010';ctx.fillRect(wx+4,wy+5,4,5);
    // Warehouse window
    ctx.fillStyle='rgba(255,240,180,0.6)';ctx.fillRect(wx+1,wy+4,2,2);
    // Resource display
    const r=RES[c.team];
    if(r){
      ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(wx-1,wy-11,36,10);
      ctx.font='bold 6px monospace';ctx.fillStyle='#aef';ctx.textAlign='left';
      ctx.fillText('W:'+r.wood+' S:'+r.stone+' I:'+r.iron,wx,wy-4);
    }
  }
  ctx.textAlign='left';
}

function drawArmy(a){
  const px=Math.round(a.x*W),py=Math.round(a.y*H);
  ctx.fillStyle=TC[a.team];
  ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(px-5,py-8,10,2);
  ctx.fillStyle=TC[a.team];ctx.fillRect(px-5,py-8,Math.round(10*a.hp/a.maxhp),2);
}

function drawBot(b){
  const tc=TC[b.team]||'#fff';
  // Body dot
  const sz=b.isKnight?5:3;
  ctx.fillStyle=b.isKnight?tc:'rgba(255,255,255,0.5)';
  ctx.fillRect(b.x-Math.floor(sz/2),b.y-Math.floor(sz/2),sz,sz);
  if(b.isKnight){
    // Knight: colored square with white center
    ctx.fillStyle=tc;ctx.fillRect(b.x-2,b.y-2,5,5);
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillRect(b.x-1,b.y-1,3,3);
    ctx.fillStyle=tc;ctx.fillRect(b.x,b.y,1,1);
  } else {
    // Worker: small colored dot
    ctx.fillStyle=tc;ctx.fillRect(b.x-1,b.y-1,3,3);
  }

}

// Color lookup for painted grid cells
const GCOL={water:'#1a6bb5',sand:'#c8a84b',grass:'#3d6e2a',jungle:'#1a6a10',
  desert:'#d4a055',rock:'#666676',mountain:'#8a8a9a',snow:'#dde0f0',lava:'#cc3300',
  tree:'#235a14',pine:'#1a4a0a',cactus:'#4a8a30',ore:'#7a4010',gold:'#e6b800',
  crystal:'#6699cc',fire:'#ff4400',burned:'#2a2a2a',plague:'#446611',
  house:'#a0522d',wall:'#888899',gate:'#665533',
  vil_red:'#c0392b',vil_blue:'#2471a3',vil_green:'#1e8449',vil_gold:'#d4ac0d'};

// Terrain base colors (2x2 px per cell)
const TBASE={
  water:    [[13,45,95],[18,75,148],[24,95,170]],
  sand:     [[200,165,70],[210,175,80],[220,185,90]],
  grass:    [[48,88,32],[55,100,38],[65,112,46]],
  jungle:   [[15,78,8],[20,90,12],[28,108,18]],
  desert:   [[205,155,70],[215,165,80],[225,175,90]],
  rock:     [[88,88,100],[95,95,108],[105,105,120]],
  mountain: [[122,122,140],[130,130,148],[145,145,165]],
  snow:     [[215,222,238],[220,228,245],[232,240,255]],
  lava:     [[180,40,0],[200,50,0],[220,60,0]],
  tree:     [[25,72,14],[30,80,18],[38,92,25]],
  pine:     [[16,55,5],[20,65,8],[26,75,12]],
  burned:   [[35,32,32],[38,35,35],[45,40,40]],
  plague:   [[35,50,12],[38,55,15],[45,65,20]],
};

function getTerrainColor(t,x,y){
  const p=TBASE[t];
  if(!p) return null;
  const n=hash(x*7+y*13,x*3+y*17)&2;
  return p[n];
}

function renderOverview(){
  // Draw simplified terrain
  for(let y=0;y<H;y+=6) for(let x=0;x<W;x+=6){
    const cell=grid[y]&&grid[y][x];
    if(!cell) continue;
    const t=cell.type;
    let r,g,b;
    if(t==='water'){r=13;g=45;b=95;}
    else if(t==='mountain'||t==='snow'){r=130;g=130;b=148;}
    else if(t==='desert'){r=200;g=165;b=80;}
    else if(t==='sand'){r=180;g=155;b=70;}
    else if(t==='rock'){r=90;g=90;b=105;}
    else{r=48;g=88;b=32;} // grass default
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(x,y,6,6);
  }
  // Draw territory colors prominently
  castles.forEach(c=>{
    if(!c.cells||c.cells.length<2) return;
    const col=TCRGB[c.team]||'128,128,128';
    for(let i=0;i<c.cells.length;i+=2){
      ctx.fillStyle=`rgba(${col},0.35)`;
      ctx.fillRect(c.cells[i],c.cells[i+1],4,4);
    }
    // Bold border
    const cellSet=new Set();
    for(let i=0;i<c.cells.length;i+=2) cellSet.add(c.cells[i+1]*W+c.cells[i]);
    ctx.fillStyle=`rgba(${col},0.95)`;
    for(let i=0;i<c.cells.length;i+=2){
      const x=c.cells[i],y=c.cells[i+1];
      const border=!cellSet.has(y*W+(x-1))||!cellSet.has(y*W+(x+1))||!cellSet.has((y-1)*W+x)||!cellSet.has((y+1)*W+x);
      if(border) ctx.fillRect(x,y,3,3);
    }
  });
  // Draw castle icons in overview
  castles.forEach(c=>{
    const cx=Math.round(c.nx*W),cy=Math.round(c.ny*H);
    const tc=TC[c.team];
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(cx-12,cy-8,24,16);
    ctx.fillStyle=tc;ctx.fillRect(cx-11,cy-7,22,14);
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(cx-10,cy-6,20,12);
    ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText('🏰',cx,cy+4);
    ctx.textAlign='left';
    // Castle power label
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(cx-15,cy+8,30,10);
    ctx.fillStyle=tc;ctx.font='bold 7px monospace';ctx.textAlign='center';
    ctx.fillText('⚡'+Math.floor(c.power),cx,cy+16);
    ctx.textAlign='left';
  });
  // Armies visible in overview
  armies.forEach(a=>{
    const px=Math.round(a.x*W),py=Math.round(a.y*H);
    ctx.fillStyle=TC[a.team];
    ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(px-4,py-7,8,4);
    ctx.fillStyle='#fff';ctx.font='5px monospace';ctx.textAlign='center';
    ctx.fillText('⚔',px,py-4);ctx.textAlign='left';
  });
}

function render(){
  // Draw terrain from grid
  ctx.fillStyle='#0d1f35';ctx.fillRect(0,0,W,H);
  const PS=3; // pixel size - 3x3 for crisp pixelart look
  for(let y=0;y<H;y+=PS) for(let x=0;x<W;x+=PS){
    const cell=grid[y]&&grid[y][x];
    if(!cell) continue;
    const t=cell.type;
    if(t==='fire'){
      const f=(tick+x+y)%4;
      ctx.fillStyle=f<2?'#ff6600':f===2?'#ff9900':'#ffcc00';
      if(Math.random()<0.008) spawnFireParticle(x,y);
    } else if(t==='lava'){
      const lv=(tick*2+x+y)%6;
      ctx.fillStyle=lv<3?'#cc3300':'#ff5500';
    } else {
      const col=getTerrainColor(t,x,y);
      if(!col) continue;
      // Add subtle variation per pixel
      const v=hash(x+y*7,y+x*3)&0xf;
      ctx.fillStyle=`rgb(${Math.min(255,col[0]+v-8)},${Math.min(255,col[1]+v-8)},${Math.min(255,col[2]+v-8)})`;
    }
    ctx.fillRect(x,y,PS,PS);
  }
  // Draw sprites (trees, ores, buildings) on top
  drawSprites();
  // Territory overlay
  ctx.drawImage(terrCanvas,0,0);
  castles.forEach(drawCastle);
  armies.forEach(drawArmy);
  bots.forEach(drawBot);
  updateParticles();
  // Day/night overlay
  updateDayNight();
  // Low-zoom: draw pixelated territory overview
  if(camZ<0.5) drawZoomedOutBorders();
}

function drawZoomedOutBorders(){
  // Draw colored territory border lines between castles
  castles.forEach(c=>{
    if(!c.cells||c.cells.length<2) return;
    const col=TCRGB[c.team]||'128,128,128';
    const cellSet=new Set();
    for(let i=0;i<c.cells.length;i+=2) cellSet.add(c.cells[i+1]*W+c.cells[i]);
    ctx.fillStyle=`rgba(${col},0.9)`;
    for(let i=0;i<c.cells.length;i+=2){
      const x=c.cells[i],y=c.cells[i+1];
      const border=!cellSet.has(y*W+(x-1))||!cellSet.has(y*W+(x+1))||
                   !cellSet.has((y-1)*W+x)||!cellSet.has((y+1)*W+x);
      if(border) ctx.fillRect(x,y,4,4);// thicker border when zoomed out
    }
    // Castle name label when zoomed out
    const cx=Math.round(c.nx*W),cy=Math.round(c.ny*H);
    const names={red:'Красные',blue:'Синие',green:'Зелёные',gold:'Золотые'};
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(cx-20,cy-20,40,10);
    ctx.fillStyle=`rgb(${col})`;ctx.font='bold 8px monospace';ctx.textAlign='center';
    ctx.fillText(names[c.team]||c.team,cx,cy-12);ctx.textAlign='left';
  });
}

function updateDayNight(){
  dayTime=(dayTime+daySpeed)%1;
  // 0=noon(bright), 0.25=dusk, 0.5=midnight, 0.75=dawn
  const t=dayTime;
  let alpha,r,g,b;
  if(t<0.3){alpha=0;r=0;g=0;b=0;} // day - no overlay
  else if(t<0.5){
    const p=(t-0.3)/0.2;
    alpha=p*0.55;r=20;g=10;b=40; // dusk - purple
  } else if(t<0.7){
    alpha=0.55;r=5;g=5;b=30; // night - deep blue
  } else if(t<0.9){
    const p=1-(t-0.7)/0.2;
    alpha=p*0.55;r=20;g=10;b=40; // dawn
  } else {alpha=0;r=0;g=0;b=0;}

  if(alpha>0.01){
    ctx.fillStyle=`rgba(${r},${g},${b},${alpha.toFixed(2)})`;
    ctx.fillRect(0,0,W,H);
  }

  // Castle lights at night
  if(alpha>0.2){
    castles.forEach(c=>{
      const cx=Math.round(c.nx*W),cy=Math.round(c.ny*H);
      const grd=ctx.createRadialGradient(cx,cy,2,cx,cy,25);
      grd.addColorStop(0,`rgba(255,200,80,${(alpha*0.6).toFixed(2)})`);
      grd.addColorStop(1,'rgba(255,150,30,0)');
      ctx.fillStyle=grd;
      ctx.fillRect(cx-25,cy-25,50,50);
    });
    // House lights
    for(let y=0;y<H;y+=8) for(let x=0;x<W;x+=8){
      const cell=grid[y]&&grid[y][x];
      if(cell&&cell.type==='house'){
        ctx.fillStyle=`rgba(255,200,80,${(alpha*0.4).toFixed(2)})`;
        ctx.fillRect(x-3,y-3,14,14);
      }
    }
  }

  // Smoke from houses/castles (always)
  if(tick%6===0){
    for(let y=0;y<H;y+=8) for(let x=0;x<W;x+=8){
      const cell=grid[y]&&grid[y][x];
      if(cell&&cell.type==='house'&&Math.random()<0.03){
        particles.push({x:x+3,y:y-1,vx:(Math.random()-0.5)*0.3,vy:-0.4-Math.random()*0.3,
          r:180,g:180,b:185,age:0,maxAge:25+Math.floor(Math.random()*15),size:1.5});
      }
    }
    castles.forEach(c=>{
      if(Math.random()<0.1){
        const cx=Math.round(c.nx*W),cy=Math.round(c.ny*H);
        particles.push({x:cx+Math.random()*6-3,y:cy-12,vx:(Math.random()-0.5)*0.4,vy:-0.6,
          r:150,g:150,b:155,age:0,maxAge:30,size:2});
      }
    });
  }
}

// Sprites drawn at fixed 8x8 px regardless of brush size
// Only drawn every 8px to avoid crowding
function drawSprites(){
  const STEP=10;
  for(let y=0;y<H;y+=STEP) for(let x=0;x<W;x+=STEP){
    const cell=grid[y]&&grid[y][x];if(!cell) continue;
    drawSprite(cell.type,x,y,cell.owner);
  }
}

function drawSprite(t,x,y,owner){
  switch(t){
    case 'tree':   drawTree(x,y); break;
    case 'pine':   drawPine(x,y); break;
    case 'ore':    drawOre(x,y); break;
    case 'gold':   drawGold(x,y); break;

  }
}

function hasWallAt(x,y){

}

function drawWall(x,y){
  const S=10; // sprite step
  const N=hasWallAt(x,y-S),S2=hasWallAt(x,y+S);
  const E=hasWallAt(x+S,y),W2=hasWallAt(x-S,y);
  const isHoriz=E||W2;
  const isVert=N||S2;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(x+1,y+7,7,1);

  if(isHoriz&&!isVert){
    // Horizontal wall segment - wider, flatter
    ctx.fillStyle='#666676';ctx.fillRect(x,y+2,8,6);
    ctx.fillStyle='#888899';ctx.fillRect(x,y+2,8,2);
    ctx.fillStyle='#777788';ctx.fillRect(x,y+1,8,2);

    ctx.fillStyle='#555566';ctx.fillRect(x,y,3,2);ctx.fillRect(x+5,y,3,2);
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(x,y+5,8,1);
  } else if(isVert&&!isHoriz){
    // Vertical wall segment - narrower
    ctx.fillStyle='#666676';ctx.fillRect(x+2,y,4,8);
    ctx.fillStyle='#888899';ctx.fillRect(x+2,y,2,8);
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(x+5,y,1,8);
  } else if(isHoriz&&isVert){
    // Corner/junction - solid block
    ctx.fillStyle='#666676';ctx.fillRect(x,y,8,8);
    ctx.fillStyle='#888899';ctx.fillRect(x,y,3,3);
    ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(x+6,y,2,8);ctx.fillRect(x,y+6,8,2);
  } else {
    // Standalone wall - default
    ctx.fillStyle='#666676';ctx.fillRect(x,y+2,8,6);
    ctx.fillStyle='#888899';ctx.fillRect(x,y+2,8,2);
    ctx.fillStyle='#555566';ctx.fillRect(x,y,3,2);ctx.fillRect(x+5,y,3,2);
  }
  // Mortar texture
  ctx.fillStyle='rgba(0,0,0,0.1)';
  ctx.fillRect(x+3,y+3,1,3);
}

// ── WEAPONS ───────────────────────────────────────────────────
function explode(cx,cy,R,lava){
  for(let dy=0-R;dy<=R;dy++) for(let dx=0-R;dx<=R;dx++){
    if(dx*dx+dy*dy>R*R) continue;
    const nx=cx+dx,ny=cy+dy;if(nx<0||ny<0||nx>=W||ny>=H) continue;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lava&&dist<R*0.35) grid[ny][nx].type='lava';
    else{const r=Math.random();grid[ny][nx].type=r<0.4?'burned':r<0.7?'sand':'rock';}
  }
  bots=bots.filter(b=>Math.hypot(b.x-cx,b.y-cy)>R*0.8);
  armies=armies.filter(a=>Math.hypot(a.x*W-cx,a.y*H-cy)>R*0.7);
  // Explosion particles
  spawnExplosion(cx,cy,30,255,150,0);   // orange
  spawnExplosion(cx,cy,20,255,50,0);    // red
  spawnExplosion(cx,cy,15,200,200,200); // smoke
  if(lava) spawnExplosion(cx,cy,25,255,80,0); // extra fire
}

// ── TOOL ──────────────────────────────────────────────────────
// Tools that should be placed once at click center (not fill brush area)
const SINGLE_PLACE=new Set(['house','gate','tree','pine','ore','gold','crystal','cactus',
  'vil_red','vil_blue','vil_green','vil_gold','bomb','meteor','lightning']);

// Sprite tools placed on 10px grid by dragging
const SPRITE_TOOLS=new Set(['house','tree','pine','ore','gold','crystal','cactus','wall','gate']);
// One-shot tools: only fire once per touch/click
const ONESHOT_TOOLS=new Set(['bomb','meteor','lightning','vil_red','vil_blue','vil_green','vil_gold']);
let lastSpriteCell={x:-99,y:-99}; // prevent double-placing on same cell

function placeSprite(cx,cy){
  // Snap to 10px grid
  const sx=Math.floor(cx/10)*10;
  const sy=Math.floor(cy/10)*10;
  if(sx<0||sy<0||sx>=W||sy>=H) return;
  // Don't place on same cell twice in one stroke
  if(sx===lastSpriteCell.x&&sy===lastSpriteCell.y) return;
  lastSpriteCell={x:sx,y:sy};
  const cell=grid[sy][sx];
  if(!cell) return;
  cell.type=curTool;
  cell.owner=null;
}

function applyTool(cx,cy,isFirst){
  if(cx<0||cy<0||cx>=W||cy>=H) return;

  // One-shot: only on first touch
  if(ONESHOT_TOOLS.has(curTool)){
    if(!isFirst) return;
    if(curTool==='bomb') explode(cx,cy,Math.round(brushSz*4),false);
    else if(curTool==='meteor') explode(cx,cy,Math.round(brushSz*6),true);
    else if(curTool==='lightning'){
      grid[cy][cx].type='burned';
      bots=bots.filter(b=>!(b.x===cx&&b.y===cy));
    }
    else if(curTool.startsWith('vil_')){
      if(!isLand(cx,cy)){logEvent('⛔ Только на суше!');return;}
      placeCastle(cx,cy,curTool.replace('vil_',''));
    }
    return;
  }

  // Sprite tools: place on grid by dragging
  if(SPRITE_TOOLS.has(curTool)){
    placeSprite(cx,cy);
    return;
  }

  // Terrain brush tools: fill circle area
  const r=Math.max(1,brushSz);
  for(let dy=0-r;dy<=r;dy++) for(let dx=0-r;dx<=r;dx++){
    if(dx*dx+dy*dy>r*r) continue;
    const nx=cx+dx,ny=cy+dy;
    if(nx<0||ny<0||nx>=W||ny>=H) continue;
    const cell=grid[ny][nx];
    if(!cell) continue;
    if(curTool==='fire'){if(FLAMMABLE.has(cell.type)) cell.type='fire';}
    else if(curTool==='flood'){cell.type='water';}
    else if(curTool==='plague'){cell.type='plague';bots=bots.filter(b=>!(b.x===nx&&b.y===ny));}
    else cell.type=curTool;
  }
}

function paintAt(sx,sy,isFirst){
  const{x:cx,y:cy}=screenToCanvas(sx,sy);
  applyTool(Math.round(cx),Math.round(cy),isFirst);
}

// ── CASTLE ────────────────────────────────────────────────────
function placeCastle(cx,cy,team){
  castles=castles.filter(c=>c.team!==team);
  // Remove old workers/knights of this team
  bots=bots.filter(b=>b.team!==team);
  const c={nx:cx/W,ny:cy/H,team,power:50,radius:6,cells:[],attackCooldown:0,craftTimer:0};
  computeTerritory(c);castles.push(c);
  rebuildTerritories();
  // Reset resources
  RES[team]={wood:0,stone:0,iron:0,swords:0,armor:0,knights:0};
  // Spawn 10 workers near castle
  let n=0;
  for(let dy=-20;dy<=20&&n<10;dy++) for(let dx=-20;dx<=20&&n<10;dx++){
    const nx2=cx+dx,ny2=cy+dy;
    if(nx2<0||ny2<0||nx2>=W||ny2>=H) continue;
    if(isLand(nx2,ny2)&&Math.random()<0.35){
      bots.push({x:nx2,y:ny2,team,hp:5,maxhp:5,timer:Math.floor(Math.random()*20),
        isKnight:false,carrying:null,res:0,homeX:cx,homeY:cy,state:'seek'});
      n++;
    }
  }
  logEvent('🏰 Замок '+team+' (+10 работяг)');
}

// ── SIMULATION ────────────────────────────────────────────────
function updateCastles(){
  let dirty=false;
  castles.forEach(c=>{
    c.power=Math.min(300,c.power+0.08);
    const nr=Math.min(22,6+Math.floor(c.power/12));
    if(nr!==c.radius){c.radius=nr;computeTerritory(c);dirty=true;}
    if(c.attackCooldown>0){c.attackCooldown--;return;}
    const enemies=castles.filter(e=>e.team!==c.team);
    if(!enemies.length||c.power<120) return;
    const target=enemies.reduce((b,e)=>Math.hypot(e.nx-c.nx,e.ny-c.ny)<Math.hypot(b.nx-c.nx,b.ny-c.ny)?e:b);
    const hp=Math.floor(c.power*0.4);
    armies.push({x:c.nx,y:c.ny,team:c.team,tx:target.nx,ty:target.ny,targetTeam:target.team,hp,maxhp:hp});
    c.power-=hp;c.attackCooldown=150;
    logEvent('⚔️ '+c.team+' → '+target.team);
  });
  if(dirty) rebuildTerritories();
  // Crafting system
  castles.forEach(c=>{
    const r=RES[c.team];if(!r) return;
    c.craftTimer=(c.craftTimer||0)+1;
    if(c.craftTimer%80!==0) return;
    // Craft sword: 3 wood + 2 iron
    if(r.wood>=3&&r.iron>=2){r.wood-=3;r.iron-=2;r.swords++;logEvent('⚔️ '+c.team+' скрафтил меч!');}
    // Craft armor: 4 stone + 2 iron
    if(r.stone>=4&&r.iron>=2){r.stone-=4;r.iron-=2;r.armor++;logEvent('🛡 '+c.team+' скрафтил броню!');}
    // Equip knight: 1 sword + 1 armor
    if(r.swords>=1&&r.armor>=1){
      r.swords--;r.armor--;r.knights++;
      // Find a worker and upgrade to knight
      const worker=bots.find(b=>b.team===c.team&&!b.isKnight);
      if(worker){worker.isKnight=true;worker.hp=10;worker.maxhp=10;logEvent('🗡 '+c.team+' новый рыцарь!');}
    }
    // Blue faction: auto-build walls/houses near castle
    const trait=TRAITS[c.team]||TRAITS.red;
    if(trait.buildSpeed>0&&c.craftTimer%Math.floor(200/trait.buildSpeed)===0&&RES[c.team].wood>=2){
      const hx=Math.round(c.nx*W),hy=Math.round(c.ny*H);
      const R2=Math.round(c.radius*Math.min(W,H)/100*0.6);
      for(let attempt=0;attempt<8;attempt++){
        const bx=Math.floor((hx+Math.floor(Math.random()*R2*2-R2))/8)*8;
        const by=Math.floor((hy+Math.floor(Math.random()*R2*2-R2))/8)*8;
        if(bx<0||by<0||bx>=W||by>=H) continue;
        const bc=grid[by]&&grid[by][bx];
        if(!bc||!WALKABLE.has(bc.type)) continue;
        const buildType=Math.random()<0.4?'wall':'house';
        bc.type=buildType;bc.owner=c.team;
        RES[c.team].wood=Math.max(0,RES[c.team].wood-2);
        break;
      }
    }
    // Population growth: spawn new worker if resources plentiful
    const gr=TRAITS[c.team]||TRAITS.red;
    if(c.craftTimer%Math.floor(300/gr.growMult)===0){
      const myBots=bots.filter(b=>b.team===c.team&&!b.isKnight);
      if(myBots.length<20&&RES[c.team].wood>=3){
        RES[c.team].wood-=3;
        const hx2=Math.round(c.nx*W),hy2=Math.round(c.ny*H);
        bots.push({x:hx2+Math.floor(Math.random()*10-5),y:hy2+Math.floor(Math.random()*10-5),
          team:c.team,hp:5,maxhp:5,timer:Math.floor(Math.random()*20),
          isKnight:false,carrying:null,res:0,homeX:hx2,homeY:hy2,state:'seek'});
        logEvent('👶 '+c.team+' +1 рабочий');
      }
    }
    // When 10 knights — launch raid
    if(r.knights>=10&&!raids.find(rd=>rd.team===c.team)){
      const knights=bots.filter(b=>b.team===c.team&&b.isKnight);
      if(knights.length>=10){
        const enemy=castles.find(ec=>ec.team!==c.team&&!defeated.find(d=>d.castle===ec));
        if(enemy){
          raids.push({team:c.team,knights:knights.slice(0,10),
            tx:Math.round(enemy.nx*W),ty:Math.round(enemy.ny*H),
            targetTeam:enemy.team,phase:'march',loot:0,battleTimer:0});
          r.knights=0;
          logEvent('⚔️ '+c.team+' — 10 рыцарей в поход на '+enemy.team+'!');
        }
      }
    }
  });
  // Rebuild defeated castles after 180s (~3 min at 1tick/60ms)
  defeated=defeated.filter(d=>{
    d.timer--;
    if(d.timer<=0){
      d.castle.power=40;d.castle.radius=8;d.castle.attackCooldown=100;
      computeTerritory(d.castle);rebuildTerritories();
      logEvent('🔄 Замок '+d.castle.team+' восстановился!');
      return false;
    }
    return true;
  });
}

function updateArmies(){
  const dead=new Set();
  armies.forEach((a,i)=>{
    if(dead.has(i)) return;
    const dx=a.tx-a.x,dy=a.ty-a.y,dist=Math.hypot(dx,dy);
    if(dist<0.008){
      const tc=castles.find(c=>c.team===a.targetTeam);
      if(tc){
        tc.power-=a.hp*1.5;
        if(tc.power<=0){
          logEvent('🏴 '+a.team+' захватил '+tc.team+'!');
          const old=tc.team;tc.team=a.team;tc.power=60;tc.radius=10;tc.attackCooldown=80;
          computeTerritory(tc);rebuildTerritories();
          bots.forEach(b=>{if(b.team===old&&Math.hypot(b.x-tc.nx*W,b.y-tc.ny*H)<15) b.team=a.team;});
        } else logEvent('🛡 '+tc.team+' отбил атаку!');
      }
      dead.add(i);return;
    }
    a.x+=dx/dist*0.005;a.y+=dy/dist*0.005;
    armies.forEach((b2,j)=>{
      if(i===j||dead.has(j)||b2.team===a.team) return;
      if(Math.hypot((b2.x-a.x)*W,(b2.y-a.y)*H)<6){
        const ta=TRAITS[a.team]||TRAITS.red;
        const tb=TRAITS[b2.team]||TRAITS.red;
        a.hp-=Math.min(a.hp,b2.hp*tb.fightMult*0.25);
        b2.hp-=Math.min(b2.hp,a.hp*ta.fightMult*0.25);
        if(a.hp<=0){dead.add(i);logEvent('💀 '+a.team+' разбит');}
        if(b2.hp<=0){dead.add(j);logEvent('💀 '+b2.team+' разбит');}
      }
    });
  });
  armies=armies.filter((_,i)=>!dead.has(i));
}

function moveToward(b,tx,ty){
  const dx=tx-b.x,dy=ty-b.y,dist=Math.hypot(dx,dy);
  if(dist<2) return true;
  const step=b.isKnight?2:1;
  const ndx=Math.round(dx/dist*step),ndy=Math.round(dy/dist*step);
  const nx2=b.x+ndx,ny2=b.y+ndy;
  if(nx2>=0&&ny2>=0&&nx2<W&&ny2<H&&isLand(nx2,ny2)){b.x=nx2;b.y=ny2;}
  return false;
}

function findNearestResource(b){
  const types=b.carrying===null?['tree','pine','rock','mountain','ore']:[];
  let best=null,bestD=9999;
  for(let dy=-60;dy<=60;dy+=2) for(let dx=-60;dx<=60;dx+=2){
    const nx2=b.x+dx,ny2=b.y+dy;
    if(nx2<0||ny2<0||nx2>=W||ny2>=H) continue;
    const t=grid[ny2][nx2].type;
    if(!types.includes(t)) continue;
    const d=Math.hypot(dx,dy);
    if(d<bestD){bestD=d;best={x:nx2,y:ny2,type:t};}
  }
  return best;
}

function updateBots(){
  const dead=new Set();
  bots.forEach((b,i)=>{
    if(dead.has(i)) return;
    b.timer=(b.timer||0)+1;
    const spd=b.isKnight?6:12;
    if(b.timer%spd!==0) return;
    if(!isLand(b.x,b.y)){dead.add(i);return;}

    const castle=castles.find(c=>c.team===b.team);
    if(!castle) return;
    const hx=Math.round(castle.nx*W),hy=Math.round(castle.ny*H);

    if(b.isKnight){
      // Knights are controlled by raid system — just wander near home if no raid
      const myRaid=raids.find(r=>r.team===b.team&&r.knights.includes(b));
      if(!myRaid){
        if(Math.random()<0.3) moveToward(b,hx+Math.floor(Math.random()*16-8),hy+Math.floor(Math.random()*16-8));
      }
      return;
    }

    // Worker AI
    if(!b.state) b.state='seek';

    if(b.state==='seek'){
      // Find nearest harvestable resource
      if(!b.target||Math.hypot(b.x-b.target.x,b.y-b.target.y)<3){
        b.target=findNearestResource(b);
      }
      if(b.target){
        const arrived=moveToward(b,b.target.x,b.target.y);
        if(arrived){
          // Harvest
          const t=grid[b.target.y]&&grid[b.target.y][b.target.x]?grid[b.target.y][b.target.x].type:null;
          const trait=TRAITS[b.team]||TRAITS.green;
          if(t==='tree'||t==='pine'){b.carrying='wood';grid[b.target.y][b.target.x].type='grass';}
          else if(t==='rock'||t==='mountain'){b.carrying='stone';}
          else if(t==='ore'){b.carrying='iron';grid[b.target.y][b.target.x].type='rock';}
          else{b.carrying='wood';}
          // Harvest animation
          spawnExplosion(b.target.x,b.target.y,3,180,140,80);
          b.state='return';b.target=null;
        }
      } else {
        // Random wander near home
        const wx=hx+Math.floor(Math.random()*30-15);
        const wy=hy+Math.floor(Math.random()*30-15);
        moveToward(b,wx,wy);
      }
    } else if(b.state==='return'){
      // Return to castle (warehouse)
      const arrived=moveToward(b,hx,hy);
      if(arrived||Math.hypot(b.x-hx,b.y-hy)<8){
        const r=RES[b.team];
        const trait=TRAITS[b.team]||TRAITS.green;
        const bonus=Math.random()<(trait.harvestMult-1)?1:0;
        if(b.carrying==='wood') r.wood=Math.min(99,r.wood+1+bonus);
        else if(b.carrying==='stone') r.stone=Math.min(99,r.stone+1+bonus);
        else if(b.carrying==='iron') r.iron=Math.min(99,r.iron+1+bonus);
        b.carrying=null;b.state='seek';
      }
    }
  });
  bots=bots.filter((_,i)=>!dead.has(i));
}

function updateRaids(){
  raids=raids.filter(raid=>{
    if(!raid.knights||raid.knights.length===0) return false;
    const aliveKnights=raid.knights.filter(k=>bots.includes(k));
    if(aliveKnights.length===0){logEvent('💀 Отряд '+raid.team+' уничтожен!');return false;}
    raid.knights=aliveKnights;

    if(raid.phase==='march'){
      // Move all knights toward target
      let allArrived=true;
      aliveKnights.forEach((k,idx)=>{
        const offsetX=(idx%4-2)*6,offsetY=(Math.floor(idx/4)-1)*6;
        const tx=raid.tx+offsetX,ty=raid.ty+offsetY;
        const arrived=moveToward(k,tx,ty);
        if(!arrived) allArrived=false;
      });
      if(allArrived||aliveKnights.some(k=>Math.hypot(k.x-raid.tx,k.y-raid.ty)<20)){
        raid.phase='battle';raid.battleTimer=0;
        logEvent('⚔️ '+raid.team+' атакует '+raid.targetTeam+'!');
      }
    } else if(raid.phase==='battle'){
      raid.battleTimer++;
      const enemy=castles.find(c=>c.team===raid.targetTeam);
      if(!enemy){raid.phase='loot';return true;}

      // Knights attack enemy bots and drain castle
      aliveKnights.forEach(k=>{
        const ei=bots.findIndex(e=>e.team!==k.team&&Math.hypot(e.x-k.x,e.y-k.y)<=6);
        if(ei>=0){bots[ei].hp-=1;if(bots[ei].hp<=0) bots.splice(ei,1);}
      });
      enemy.power=Math.max(0,enemy.power-aliveKnights.length*0.4);

      // Spawn clash particle
      if(raid.battleTimer%5===0){
        lootAnims.push({x:raid.tx+Math.random()*20-10,y:raid.ty+Math.random()*20-10,
          team:raid.team,type:'clash',age:0});
      }

      if(enemy.power<=0){
        // Victory! Loot resources
        const er=RES[raid.targetTeam];
        const myR=RES[raid.team];
        const lootWood=Math.floor(er.wood*0.5);
        const lootStone=Math.floor(er.stone*0.5);
        const lootIron=Math.floor(er.iron*0.5);
        myR.wood=Math.min(99,myR.wood+lootWood);
        myR.stone=Math.min(99,myR.stone+lootStone);
        myR.iron=Math.min(99,myR.iron+lootIron);
        er.wood-=lootWood;er.stone-=lootStone;er.iron-=lootIron;
        raid.loot=lootWood+lootStone+lootIron;
        // Defeat the castle
        defeated.push({castle:enemy,timer:3000});
        enemy.power=0;enemy.radius=3;
        computeTerritory(enemy);rebuildTerritories();
        logEvent('🏆 '+raid.team+' захватил замок! +'+raid.loot+' ресурсов');
        lootAnims.push({x:raid.tx,y:raid.ty,team:raid.team,type:'victory',age:0});
        raid.phase='return';
      } else if(raid.battleTimer>400){
        // Retreat
        logEvent('🏃 '+raid.team+' отступил — замок устоял!');
        raid.phase='return';
      }
    } else if(raid.phase==='return'){
      const castle=castles.find(c=>c.team===raid.team);
      if(!castle) return false;
      const hx=Math.round(castle.nx*W),hy=Math.round(castle.ny*H);
      let allHome=true;
      aliveKnights.forEach((k,idx)=>{
        const arrived=moveToward(k,hx+idx*3-15,hy);
        if(!arrived) allHome=false;
      });
      if(allHome){
        logEvent('🏠 '+raid.team+' вернулся домой!');
        // Knights become workers again
        aliveKnights.forEach(k=>{k.isKnight=false;k.hp=5;k.maxhp=5;k.state='seek';});
        return false;
      }
    }
    return true;
  });

  // Draw loot animations
  lootAnims=lootAnims.filter(a=>{
    a.age++;
    if(a.type==='clash'){
      ctx.fillStyle='rgba(255,200,0,'+Math.max(0,0.8-a.age/20)+')';
      ctx.font='8px serif';ctx.textAlign='center';
      ctx.fillText('⚔',a.x,a.y-a.age*0.5);
    } else if(a.type==='victory'){
      ctx.fillStyle='rgba(255,215,0,'+Math.max(0,1-a.age/60)+')';
      ctx.font=(8+a.age/4)+'px serif';ctx.textAlign='center';
      ctx.fillText('🏆',a.x,a.y-a.age);
    }
    ctx.textAlign='left';
    return a.age<60;
  });
}

function updateFire(){
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const c=grid[y][x];if(c.type!=='fire') continue;
    c.fa=(c.fa||0)+1;
    if(c.fa>40+Math.floor(Math.random()*40)){c.type='burned';c.fa=0;continue;}
    if(Math.random()<Math.max(0,0.05-c.fa*0.001)){
      const d=D4[Math.floor(Math.random()*4)];
      const nx2=x+d[0],ny2=y+d[1];
      if(nx2>=0&&ny2>=0&&nx2<W&&ny2<H&&FLAMMABLE.has(grid[ny2][nx2].type)){grid[ny2][nx2].type='fire';grid[ny2][nx2].fa=0;}
    }
  }
}

function logEvent(msg){evts.unshift(msg);if(evts.length>5) evts.pop();document.getElementById('elog').innerHTML=evts.join('<br>');}
function updateStats(){
  const c={red:0,blue:0,green:0,gold:0};
  bots.forEach(b=>c[b.team]=(c[b.team]||0)+1);
  document.getElementById('sr').textContent=c.red||0;
  document.getElementById('sbl').textContent=c.blue||0;
  document.getElementById('sg').textContent=c.green||0;
  document.getElementById('sy').textContent=c.gold||0;
  // Show resources of first active castle team
  const active=castles[0];
  if(active){
    const r=RES[active.team];
    document.getElementById('res-wood').textContent=r.wood||0;
    document.getElementById('res-stone').textContent=r.stone||0;
    document.getElementById('res-iron').textContent=r.iron||0;
    document.getElementById('res-knights').textContent=r.knights||0;
  }
  // Day/night label
  const dt=dayTime;
  const dayLabel=dt<0.25?'День':dt<0.5?'Закат':dt<0.75?'Ночь':'Рассвет';
  document.getElementById('day-time').textContent=dayLabel;
}

// ── MAIN LOOP ─────────────────────────────────────────────────
let lastT=0;
function loop(ts){
  rafId=requestAnimationFrame(loop);
  if(ts-lastT<60) return;
  lastT=ts;tick++;
  // Smooth zoom lerp
  if(Math.abs(camZ-targetZ)>0.001){
    camZ+=(targetZ-camZ)*0.15;
    clampCam();
  }
  if(tick%2===0) updateBots();
  if(tick%3===0) updateFire();
  if(tick%4===0) updateArmies();
  if(tick%3===0) updateRaids();
  if(tick%30===0) updateCastles();
  if(tick%20===0) updateStats();
  render();
  applyTransform();
}

// ── TOUCH EVENTS (functions only, listeners added after DOM ready) ──
function getTouchDist(t){return Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY);}
function getTouchMid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}
function setupEvents(){
  // Pan mode button
  const panBtn=document.getElementById('pan-btn');
  panBtn.addEventListener('click',()=>{
    isPanMode=!isPanMode;
    panBtn.style.background=isPanMode?'rgba(55,138,221,0.5)':'rgba(10,20,35,0.82)';
    panBtn.textContent=isPanMode?'✋':'🖐';
  });


wrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    isPinching=true;isDrawing=false;
    pinchStartDist=getTouchDist(e.touches);
    lastPinchDist=pinchStartDist;
    pinchStartZ=camZ;
    const mid=getTouchMid(e.touches);
    panStartX=mid.x;panStartY=mid.y;
    panStartCamX=camX;panStartCamY=camY;
  } else if(e.touches.length===1&&!isPinching){
    const t=e.touches[0];
    if(isPanMode){
      panStartX=t.clientX;panStartY=t.clientY;
      panStartCamX=camX;panStartCamY=camY;
    } else {
      isDrawing=true;
      paintAt(t.clientX,t.clientY);
    }
  }
},{passive:false});

wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&isPinching){
    const dist=getTouchDist(e.touches);
    const mid=getTouchMid(e.touches);
    if(lastPinchDist>0){
      // Incremental zoom - much smoother than ratio-based
      const delta=dist/lastPinchDist;
      const newZ=Math.max(MIN_Z,Math.min(MAX_Z,camZ*delta));
      const rect=wrap.getBoundingClientRect();
      const mx=mid.x-rect.left, my=mid.y-rect.top;
      camX=mx+(camX-mx)*newZ/camZ;
      camY=my+(camY-my)*newZ/camZ;
      camZ=newZ;targetZ=newZ;
    }
    lastPinchDist=dist;
    // Pan while pinching
    const dx=mid.x-panStartX, dy=mid.y-panStartY;
    camX=panStartCamX-dx; camY=panStartCamY-dy;
    panStartX=mid.x; panStartY=mid.y;
    panStartCamX=camX; panStartCamY=camY;
    clampCam();showZoomIndicator();
  } else if(e.touches.length===1){
    const t=e.touches[0];
    if(isPanMode){
      panVelX=panStartX-t.clientX;
      panVelY=panStartY-t.clientY;
      camX=panStartCamX+(t.clientX-panStartX)*-1;
      camY=panStartCamY+(t.clientY-panStartY)*-1;
      lastPanX=t.clientX;lastPanY=t.clientY;
      clampCam();
    } else if(isDrawing){
      paintAt(t.clientX,t.clientY,false);
    }
  }
},{passive:false});

wrap.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.touches.length<2){isPinching=false;lastPinchDist=0;}
  if(e.touches.length===0) isDrawing=false;
},{passive:false});

// Mouse support (desktop testing)
wrap.addEventListener('mousedown',e=>{
  if(isPanMode){panStartX=e.clientX;panStartY=e.clientY;panStartCamX=camX;panStartCamY=camY;isDrawing=true;}
  else{lastSpriteCell={x:-99,y:-99};isDrawing=true;paintAt(e.clientX,e.clientY,true);}
});
wrap.addEventListener('mousemove',e=>{
  if(!isDrawing) return;
  if(isPanMode){camX=panStartCamX-(e.clientX-panStartX);camY=panStartCamY-(e.clientY-panStartY);clampCam();}
  else paintAt(e.clientX,e.clientY,false);
});
wrap.addEventListener('mouseup',()=>isDrawing=false);
wrap.addEventListener('mouseleave',()=>isDrawing=false);
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.9:1.1;
  const newZ=Math.max(MIN_Z,Math.min(MAX_Z,camZ*delta));
  const rect=wrap.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  camX=mx+( camX-mx)*newZ/camZ;
  camY=my+(camY-my)*newZ/camZ;
  camZ=newZ;clampCam();showZoomIndicator();
},{passive:false});
} // end setupEvents

function getToolIcon(id){
  const icons={
    water:'🌊',sand:'🏖',grass:'🌿',jungle:'🌴',desert:'🏜',
    rock:'🪨',mountain:'⛰',snow:'❄️',lava:'🌋',
    tree:'🌳',pine:'🌲',cactus:'🌵',ore:'⛏',gold:'💛',crystal:'💎',
    bomb:'💣',fire:'🔥',meteor:'☄️',flood:'💧',plague:'☠️',lightning:'⚡',
    house:'🏠',wall:'🧱',gate:'🚪',
    vil_red:'🔴',vil_blue:'🔵',vil_green:'🟢',vil_gold:'🟡',
  };
  return icons[id]||'❓';
}

function renderTools(){
  const box=document.getElementById('tbx');box.innerHTML='';
  TABS[curTab].forEach(t=>{
    const el=document.createElement('div');
    el.className='tl'+(curTool===t.id?' active':'');
    const icon=getToolIcon(t.id);
    el.innerHTML=`<div class="td" style="background:${t.color};display:flex;align-items:center;justify-content:center;font-size:13px">${icon}</div><span class="tn">${t.label}</span>`;
    el.addEventListener('touchstart',ev=>{ev.stopPropagation();curTool=t.id;renderTools();},{passive:true});
    el.addEventListener('click',()=>{curTool=t.id;renderTools();});
    box.appendChild(el);
  });
}
function swTab(i){curTab=i;curTool=TABS[i][0].id;document.querySelectorAll('.tab').forEach((el,j)=>el.classList.toggle('active',j===i));renderTools();}
function showHint(txt){const h=document.getElementById('hint');h.textContent=txt;h.style.opacity='1';clearTimeout(h._t);h._t=setTimeout(()=>h.style.opacity='0',1500);}

document.getElementById('bsl').addEventListener('input',function(){brushSz=parseInt(this.value);document.getElementById('bval').textContent=brushSz;});

// ── WORLD ACTIONS ─────────────────────────────────────────────
function resetWorld(){
  cancelAnimationFrame(rafId);
  landMask=null;mapCache=null;
  initBase();renderTools();
  document.getElementById('loading').style.display='flex';
  document.getElementById('loading-bar').style.width='0%';
  buildMask(()=>{buildMapCache();document.getElementById('loading').style.display='none';rafId=requestAnimationFrame(loop);});
}

function loadEurope(){
  cancelAnimationFrame(rafId);
  landMask=null;mapCache=null;
  initBase();
  document.getElementById('loading').style.display='flex';
  document.getElementById('loading-bar').style.width='0%';
  buildMask(()=>{buildMapCache();document.getElementById('loading').style.display='none';rafId=requestAnimationFrame(loop);});
}

// ── START ─────────────────────────────────────────────────────
window.addEventListener('load',function(){
  initBase();
  renderTools();
  setupEvents();
  document.getElementById('loading').style.display='flex';
  document.getElementById('loading-bar').style.width='0%';
  buildMask(()=>{
    buildMapCache();
    document.getElementById('loading').style.display='none';
    rafId=requestAnimationFrame(loop);
  });
});
</script>
