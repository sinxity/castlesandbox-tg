<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Castle Sandbox v1.3</title>
<script>
window.Telegram={WebApp:{ready:function(){},expand:function(){},setHeaderColor:function(){},setBackgroundColor:function(){}}};
</script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="cw">
    <canvas id="gc"></canvas>
    <div id="loading">
      <div id="loading-title">🏰 Castle Sandbox <span style="font-size:11px;opacity:0.6">v1.3</span></div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
      <div id="loading-pct">Генерируем мир... 0%</div>
    </div>
    <div id="topbar">
      <div id="map-btns">
        <button class="tbtn" onclick="resetWorld()">🌍 Новый</button>
        <button class="tbtn" onclick="loadEurope()">🗺 Европа</button>
        <button class="tbtn" id="pan-btn" title="Режим перемещения">🖐</button>
        <button class="tbtn" id="speed-btn" onclick="cycleSpeed()" title="Скорость игры">▶️</button>
        <button class="tbtn" onclick="saveGame()" title="Сохранить">💾</button>
        <button class="tbtn" onclick="loadGame()" title="Загрузить">📂</button>
      </div>
      <div id="stats">
        🔴<b id="sr">0</b> 🔵<b id="sbl">0</b> 🟢<b id="sg">0</b> 🟡<b id="sy">0</b><br>
        🪵<b id="res-wood">0</b> 🪨<b id="res-stone">0</b> ⚙️<b id="res-iron">0</b><br>
        ⚔️<b id="res-knights">0</b>/10 🌙<b id="day-time">День</b><br>
        🗓<b id="day-count">0</b> <b id="weather-icon">☀️</b>
        <div id="faction-row">
          <div class="fbtn" data-team="red" style="background:#e74c3c" onclick="setPlayerTeam('red')" title="Красные">🔴</div>
          <div class="fbtn" data-team="blue" style="background:#3498db" onclick="setPlayerTeam('blue')" title="Синие">🔵</div>
          <div class="fbtn" data-team="green" style="background:#2ecc71" onclick="setPlayerTeam('green')" title="Зелёные">🟢</div>
          <div class="fbtn" data-team="gold" style="background:#f1c40f" onclick="setPlayerTeam('gold')" title="Золотые">🟡</div>
        </div>
      </div>
    </div>

    <div id="elog"></div>
    <div id="zoom-indicator"></div>
    <div id="hint"></div>

    <div id="minimap-wrap">
      <canvas id="minimap" width="120" height="90"></canvas>
    </div>

    <div id="victory-overlay">
      <div id="victory-text">🏆 ПОБЕДА!</div>
      <div id="victory-sub">Все замки покорены</div>
      <button onclick="resetWorld()">🌍 Новая игра</button>
    </div>
  </div>
  <div id="bot">
    <div class="tabs">
      <div class="tab active" onclick="swTab(0)">Terrain</div>
      <div class="tab" onclick="swTab(1)">Природа</div>
      <div class="tab" onclick="swTab(2)">Оружие</div>
      <div class="tab" onclick="swTab(3)">Поселение</div>
    </div>
    <div id="brush-row">
      <span class="brl">Кисть</span>
      <input type="range" id="bsl" min="1" max="15" value="4" step="1">
      <span id="bval">4</span>
    </div>
    <div class="tbx" id="tbx"></div>
  </div>
</div>

<script>
// Telegram WebApp init
if(window.Telegram&&window.Telegram.WebApp){
  const tg=window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0d1f35');
  tg.setBackgroundColor('#0d1f35');
}
</script>

<!-- Load order matters: each file depends on the previous ones -->
<script src="js/geodata.js"></script>
<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/terrain.js"></script>
<script src="js/render.js"></script>
<script src="js/simulation.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
